<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Panel - BDIX IPTV LIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: '#e50914',
            dark: '#0d0d12',
            panel: '#16181d',
            card: '#1f2128',
            'card-hover': '#2a2d36',
            'border-color': '#2a2d36'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Hide dashboard initially */
    #dashboard-section {
      display: none;
    }
  </style>
</head>

<body class="bg-dark text-slate-200 font-sans min-h-screen antialiased selection:bg-primary/30">

  <!-- AUTH SECTION -->
  <div id="auth-section" class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Glow -->
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-primary/20 blur-[100px] rounded-full pointer-events-none">
    </div>

    <div
      class="w-full max-w-md bg-panel/80 backdrop-blur-xl border border-border-color rounded-2xl p-8 shadow-2xl relative z-10">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center gap-2 mb-2">
          <span class="text-2xl font-extrabold tracking-wide text-white">BDIX <span
              class="text-primary">IPTV</span></span>
          <span
            class="bg-primary/20 text-primary text-xs px-2 py-0.5 rounded font-bold uppercase tracking-wider">Admin</span>
        </div>
        <p class="text-slate-400 text-sm">Secure login to manage your streams</p>
      </div>

      <div class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
          <input type="email" id="login-email"
            class="w-full bg-dark/50 border border-border-color text-white rounded-lg px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"
            placeholder="admin@example.com">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
          <input type="password" id="login-pass"
            class="w-full bg-dark/50 border border-border-color text-white rounded-lg px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"
            placeholder="••••••••">
        </div>
        <button id="login-btn"
          class="w-full bg-primary hover:bg-primary/90 text-white font-bold rounded-lg px-4 py-3 transition-colors shadow-lg shadow-primary/25 active:scale-[0.98]">
          Authenticate
        </button>
        <div id="auth-error" class="text-primary text-sm text-center font-medium empty:hidden mt-2"></div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboard-section" class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <header class="h-16 flex items-center justify-between px-6 bg-panel border-b border-border-color sticky top-0 z-50">
      <div class="flex items-center gap-2">
        <span class="text-xl font-extrabold tracking-wide text-white">BDIX <span class="text-primary">IPTV</span></span>
        <span class="bg-primary/20 text-primary text-[10px] px-1.5 py-0.5 rounded font-bold uppercase">Admin</span>
      </div>
      <div class="flex items-center gap-4">
        <div class="hidden sm:flex items-center gap-2 text-sm text-slate-400">
          <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
          <span id="admin-user-email"></span>
        </div>
        <div class="h-6 w-px bg-border-color mx-1"></div>
        <a href="index.html" class="text-sm font-medium text-slate-300 hover:text-white transition-colors">View Site</a>
        <button id="logout-btn"
          class="bg-card hover:bg-card-hover border border-border-color text-white text-sm font-medium px-4 py-1.5 rounded-md transition-colors">Logout</button>
      </div>
    </header>

    <main class="flex-1 p-6 max-w-7xl w-full mx-auto">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Categories Panel -->
        <div class="lg:col-span-1 flex flex-col gap-4">
          <div class="bg-panel border border-border-color rounded-xl overflow-hidden flex flex-col h-[500px]">
            <div class="p-5 border-b border-border-color shrink-0 bg-panel/50">
              <h3 class="font-bold text-lg text-white mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="text-primary">
                  <path d="M4 20h16" />
                  <path d="m6 16 6-12 6 12" />
                  <path d="M8 12h8" />
                </svg>
                Categories
              </h3>
              <div class="flex gap-2">
                <input type="text" id="new-cat-name"
                  class="flex-1 bg-dark border border-border-color text-sm text-white rounded-lg px-3 py-2 focus:outline-none focus:border-primary transition-colors"
                  placeholder="New category...">
                <button id="add-cat-btn"
                  class="bg-card hover:bg-card-hover border border-border-color text-white font-medium rounded-lg px-4 py-2 transition-colors shrink-0">Add</button>
              </div>
            </div>
            <div class="flex-1 overflow-y-auto p-2 custom-scrollbar">
              <ul id="admin-categories" class="space-y-1">
                <!-- Categories injected here -->
              </ul>
            </div>
          </div>
        </div>

        <!-- Channels Panel -->
        <div class="lg:col-span-2 flex flex-col gap-6">

          <div class="bg-panel border border-border-color rounded-xl overflow-hidden flex flex-col">
            <div
              class="p-5 border-b border-border-color flex flex-col sm:flex-row justify-between items-center gap-4 bg-panel/50">
              <h3 class="font-bold text-lg text-white flex items-center gap-2 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="text-primary">
                  <rect width="20" height="15" x="2" y="7" rx="2" ry="2" />
                  <polyline points="17 2 12 7 7 2" />
                </svg>
                Manage Channels
              </h3>
              <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
                <button id="delete-selected-btn"
                  class="hidden w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg px-4 py-2 transition-colors flex justify-center items-center gap-1.5 shadow-lg shadow-red-600/20 shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18" />
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                  </svg>
                  Delete (<span id="selected-count">0</span>)
                </button>
                <div class="relative w-full sm:w-48">
                  <select id="admin-filter-category"
                    class="w-full bg-dark border border-border-color text-sm text-white rounded-lg px-3 py-2 focus:outline-none focus:border-primary transition-colors appearance-none cursor-pointer">
                    <option value="">All Categories</option>
                  </select>
                  <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="m6 9 6 6 6-6" />
                    </svg>
                  </div>
                </div>
                <div class="relative w-full sm:w-64">
                  <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                    xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                  </svg>
                  <input type="text" id="admin-search-channel"
                    class="w-full bg-dark border border-border-color text-sm text-white rounded-lg pl-9 pr-3 py-2 focus:outline-none focus:border-primary transition-colors"
                    placeholder="Search channel...">
                </div>
                <button id="show-add-modal-btn"
                  class="w-full sm:w-auto bg-primary hover:bg-primary/90 text-white text-sm font-medium rounded-lg px-4 py-2 transition-colors flex justify-center items-center gap-1.5 shadow-lg shadow-primary/20 shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="M12 5v14" />
                  </svg>
                  Add Channel
                </button>
              </div>
            </div>

            <div class="overflow-x-auto max-h-[600px] custom-scrollbar">
              <table class="w-full text-left text-sm whitespace-nowrap">
                <thead
                  class="text-xs text-slate-400 uppercase bg-dark/50 sticky top-0 z-10 border-b border-border-color">
                  <tr>
                    <th class="px-5 py-3 w-10 text-center"><input type="checkbox" id="select-all-channels"
                        class="w-4 h-4 rounded border-border-color cursor-pointer bg-dark accent-primary"></th>
                    <th class="px-5 py-3 font-semibold">ID</th>
                    <th class="px-5 py-3 font-semibold">Name</th>
                    <th class="px-5 py-3 font-semibold">Category</th>
                    <th class="px-5 py-3 font-semibold text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="admin-channels" class="divide-y divide-border-color text-slate-300">
                  <!-- Channels injected here -->
                </tbody>
              </table>
            </div>
          </div>

          <!-- Add/Edit Channel Form (Inline Modal) -->
          <div id="channel-form-panel"
            class="bg-card border border-primary/30 rounded-xl overflow-hidden shadow-2xl shadow-primary/5 hidden relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-orange-500"></div>
            <div class="p-6">
              <h3 id="form-title" class="font-bold text-xl text-white mb-6">Add New Channel</h3>
              <input type="hidden" id="ch-doc-id">

              <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                <div>
                  <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Sequence ID</label>
                  <input type="number" id="ch-id"
                    class="w-full bg-dark border border-border-color text-white rounded-lg px-3 py-2.5 focus:outline-none focus:border-primary transition-colors"
                    placeholder="e.g. 1">
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Channel Name</label>
                  <input type="text" id="ch-name"
                    class="w-full bg-dark border border-border-color text-white rounded-lg px-3 py-2.5 focus:outline-none focus:border-primary transition-colors"
                    placeholder="BBC News">
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Category</label>
                  <select id="ch-category"
                    class="w-full bg-dark border border-border-color text-white rounded-lg px-3 py-2.5 focus:outline-none focus:border-primary transition-colors appearance-none">
                    <!-- Categories injected here -->
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Logo URL</label>
                  <input type="url" id="ch-logo"
                    class="w-full bg-dark border border-border-color text-white rounded-lg px-3 py-2.5 focus:outline-none focus:border-primary transition-colors"
                    placeholder="https://...">
                </div>
                <div class="md:col-span-2">
                  <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Stream URL (M3U8)</label>
                  <input type="url" id="ch-stream"
                    class="w-full bg-dark border border-border-color text-white rounded-lg px-3 py-2.5 focus:outline-none focus:border-primary transition-colors font-mono text-sm"
                    placeholder="http://...">
                </div>
              </div>

              <div class="flex items-center gap-3">
                <button id="save-channel-btn"
                  class="bg-primary hover:bg-primary/90 text-white font-medium rounded-lg px-6 py-2.5 transition-colors shadow-lg shadow-primary/20">Save
                  Channel</button>
                <button id="cancel-channel-btn"
                  class="bg-dark hover:bg-black border border-border-color text-slate-300 hover:text-white font-medium rounded-lg px-6 py-2.5 transition-colors">Cancel</button>
                <div id="channel-status" class="ml-4 text-sm font-medium empty:hidden"></div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-5 right-5 flex flex-col gap-3 z-50"></div>

  <!-- Custom Confirm Modal -->
  <div id="confirm-modal"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 opacity-0 transition-opacity">
    <div
      class="bg-panel border border-border-color rounded-xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform">
      <div class="p-5">
        <h3 id="confirm-title" class="text-lg font-bold text-white mb-2">Confirm Action</h3>
        <p id="confirm-message" class="text-slate-400 text-sm">Are you sure you want to proceed?</p>
      </div>
      <div class="p-4 bg-dark/50 border-t border-border-color flex justify-end gap-3">
        <button id="confirm-cancel-btn"
          class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white bg-dark hover:bg-card border border-border-color rounded-lg transition-colors">Cancel</button>
        <button id="confirm-ok-btn"
          class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors shadow-lg shadow-red-600/20">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>

</html>
