<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDIX IPTV — Live TV Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />

  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: '#e50914',
            dark: '#0d0d12',
            panel: '#16181d',
            card: '#1f2128',
            'card-hover': '#2a2d36',
          }
        }
      }
    }
  </script>

  <!-- We keep style.css for basic custom scrollbars, but everything else is Tailwind -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-dark text-slate-100 font-sans h-screen flex flex-col overflow-hidden antialiased">

  <!-- Navbar -->
  <header class="h-16 flex items-center justify-between px-6 bg-black border-b border-slate-800 shrink-0 z-10">
    <div class="flex items-center gap-3">
      <span class="text-xl font-extrabold tracking-wide">BDIX <span class="text-primary">IPTV</span> <span
          class="bg-primary/20 text-primary text-[10px] px-1.5 py-0.5 rounded font-bold align-middle ml-1">LIVE</span></span>
    </div>
    <a href="#"
      class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-full transition-colors"
      target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
        <path
          d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.312h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z" />
      </svg>
      FB Page
    </a>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex overflow-hidden lg:flex-row flex-col">

    <!-- Left: Player Area -->
    <section class="flex-1 bg-black flex flex-col relative h-full">
      <!-- Player Wrapper -->
      <div class="flex-1 relative overflow-hidden bg-black w-full h-full">
        <video id="video-player" controls preload="auto" autoplay playsinline
          class="absolute inset-0 w-full h-full object-contain z-10"></video>

        <!-- Quality Selector (Hidden by default) -->
        <div id="quality-container" class="absolute top-4 right-4 z-30 hidden">
          <div class="relative group">
            <button id="quality-btn"
              class="bg-black/60 hover:bg-black/80 text-white p-2 rounded-full backdrop-blur-sm transition-colors border border-white/10 shadow-lg"
              title="Quality Settings">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
              </svg>
            </button>
            <div id="quality-menu"
              class="absolute right-0 mt-2 w-32 bg-panel border border-slate-800 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 overflow-hidden flex flex-col py-1">
              <!-- Quality options injected here -->
            </div>
          </div>
        </div>

        <div id="player-overlay"
          class="absolute inset-0 bg-gradient-to-t from-black/80 to-black/40 flex flex-col items-center justify-center text-center p-6 z-20 transition-opacity duration-300">
          <h2 id="overlay-title" class="text-3xl font-bold mb-2">Select a channel to play</h2>
          <p class="text-slate-400 text-lg">Click on any channel from the sidebar to start streaming.</p>
        </div>
      </div>

      <!-- Player Status Bar -->
      <div
        class="h-10 bg-[#08080a] border-t border-slate-800 flex items-center px-5 gap-3 text-sm text-slate-400 shrink-0 z-30">
        <span class="status-indicator w-2 h-2 rounded-full bg-slate-400"></span>
        <span id="playing-status">Playing: None</span>
      </div>
    </section>

    <!-- Right: Sidebar Area -->
    <aside class="w-full lg:w-96 bg-panel border-l border-slate-800 flex flex-col h-full shrink-0">
      <div class="p-5 pb-3 border-b border-slate-800 shrink-0">

        <!-- Search Box -->
        <div class="relative mb-4">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" xmlns="http://www.w3.org/2000/svg"
            width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" placeholder="Search channels..." autocomplete="off"
            class="w-full bg-dark border border-slate-700 text-slate-100 py-2.5 pl-10 pr-10 rounded-full text-sm outline-none focus:border-primary transition-colors" />
          <button id="search-clear"
            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white hidden"
            aria-label="Clear search">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <!-- Category Scroll Wrapper -->
        <div class="overflow-x-auto -mx-5 px-5 pb-2 custom-scrollbar">
          <div id="category-bar" class="flex gap-2 w-max pr-5">
            <!-- Categories injected via JS -->
          </div>
        </div>

        <div
          class="flex justify-between items-center mt-2 text-xs text-slate-400 uppercase tracking-wider font-semibold">
          <span id="channel-count">0 channels</span>
        </div>
      </div>

      <!-- Channel List -->
      <div class="flex-1 overflow-y-auto p-3 custom-scrollbar relative">
        <div id="channel-list" class="flex flex-col gap-2">
          <!-- Channels injected via JS -->
        </div>

        <div id="no-results" class="hidden flex-col items-center justify-center h-full text-center text-slate-400 p-5">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            class="mb-4 opacity-50">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
            <path d="m15 15-6-6" />
            <path d="m9 15 6-6" />
          </svg>
          <h3 class="text-lg text-slate-100 font-semibold mb-2">No channels found</h3>
          <p class="text-sm">Try searching for a different name or category</p>
        </div>
      </div>
    </aside>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script type="module" src="js/app.js?v=2"></script>
</body>

</html>
