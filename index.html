<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BDIX IPTV — Live TV Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />

  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: '#e50914',
            dark: '#060608',
            panel: '#0d0e14',
            card: '#1f2128',
            'card-hover': '#2a2d36',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-dark text-slate-100 font-sans min-h-screen antialiased">

  <!-- ───────────── Navbar ───────────── -->
  <header class="glass-strong sticky top-0 z-50 px-4 sm:px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <span class="text-2xl">📺</span>
      <div class="flex items-baseline gap-2">
        <span class="text-lg sm:text-xl font-extrabold tracking-tight text-gradient">BDIX IPTV</span>
        <span class="live-badge text-white text-[9px] sm:text-[10px] px-1.5 py-0.5 rounded font-bold tracking-widest">LIVE</span>
      </div>
    </div>
    <a href="https://www.facebook.com/profile.php?id=100086024240518"
      class="glass flex items-center gap-2 hover:bg-white/10 text-white text-xs sm:text-sm font-semibold px-3 sm:px-4 py-2 rounded-full transition-all"
      target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 24 24">
        <path
          d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.312h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z" />
      </svg>
      <span class="hidden xs:inline sm:inline">Facebook</span>
    </a>
  </header>

  <!-- ───────────── Main Content ───────────── -->
  <main class="flex flex-col lg:flex-row gap-4 lg:gap-5 p-4 lg:p-5 max-w-[1800px] mx-auto">

    <!-- ═══════════ LEFT: Player + Now Playing ═══════════ -->
    <section class="flex flex-col gap-4 w-full lg:flex-1 lg:min-h-[calc(100vh-7rem)]">

      <!-- Now Playing Banner -->
      <div id="now-playing-banner"
        class="now-playing-banner rounded-2xl px-4 sm:px-5 py-3.5 flex items-center gap-4 shrink-0 fade-in">
        <!-- Logo / Icon -->
        <div id="np-logo" class="w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center shrink-0 overflow-hidden">
          <span id="np-placeholder" class="text-xl sm:text-2xl">🎬</span>
          <img id="np-img" src="" alt="" class="hidden w-full h-full object-contain p-1 bg-white" />
        </div>
        <!-- Info -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-0.5">
            <span id="np-live" class="hidden live-badge text-white text-[9px] font-bold px-1.5 py-0.5 rounded tracking-widest">● LIVE</span>
            <span id="np-category" class="text-[10px] sm:text-xs uppercase tracking-wider text-slate-400 font-semibold truncate">Welcome</span>
          </div>
          <h2 id="np-title" class="text-base sm:text-lg font-bold text-white truncate">Select a channel to start</h2>
        </div>
        <!-- Quality selector lives outside, in player -->
      </div>

      <!-- Player Frame -->
      <div class="player-frame rounded-2xl overflow-hidden flex-1 flex flex-col min-h-[40vh] lg:min-h-0">
        <div class="relative flex-1 bg-black overflow-hidden">
          <video id="video-player" controls preload="auto" autoplay playsinline
            class="absolute inset-0 w-full h-full object-contain z-10"></video>

          <!-- Quality Selector -->
          <div id="quality-container" class="absolute top-3 right-3 z-30 hidden">
            <div class="relative group">
              <button id="quality-btn"
                class="quality-btn text-white p-2 rounded-full"
                title="Quality Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3" />
                  <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
              </button>
              <div id="quality-menu"
                class="quality-menu absolute right-0 mt-2 w-32 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 overflow-hidden flex flex-col py-1">
                <!-- Quality options injected here -->
              </div>
            </div>
          </div>

          <!-- Idle overlay -->
          <div id="player-overlay"
            class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/50 to-black/30 flex flex-col items-center justify-center text-center p-6 z-20 transition-opacity duration-300">
            <div class="w-20 h-20 rounded-2xl glass-strong flex items-center justify-center mb-5">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-primary">
                <polygon points="6 3 20 12 6 21 6 3" />
              </svg>
            </div>
            <h2 class="text-xl md:text-2xl font-extrabold text-white mb-2">Ready to Stream</h2>
            <p class="text-slate-300/80 text-sm md:text-base max-w-sm">Pick any channel from the list to start watching live TV.</p>
          </div>
        </div>

        <!-- Status Bar -->
        <div class="glass px-4 sm:px-5 py-2.5 flex items-center gap-3 text-xs sm:text-sm text-slate-300 shrink-0 border-t border-white/5">
          <span class="status-indicator w-2 h-2 rounded-full"></span>
          <span id="playing-status">Idle — no channel selected</span>
        </div>
      </div>
    </section>

    <!-- ═══════════ RIGHT: Sidebar ═══════════ -->
    <aside
      class="glass-strong rounded-2xl w-full lg:w-[400px] xl:w-[420px] shrink-0 flex flex-col lg:max-h-[calc(100vh-7rem)] overflow-hidden">

      <!-- Sidebar Header -->
      <div class="px-4 sm:px-5 pt-4 pb-3 border-b border-white/8 shrink-0">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-white flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary">
              <rect width="20" height="14" x="2" y="3" rx="2" />
              <line x1="8" x2="16" y1="21" y2="21" />
              <line x1="12" x2="12" y1="17" y2="21" />
            </svg>
            Channels
          </h3>
          <span id="channel-count" class="text-xs text-slate-400 font-medium px-2.5 py-1 rounded-full bg-white/5 border border-white/8">0</span>
        </div>

        <!-- Search -->
        <div class="relative mb-3">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" xmlns="http://www.w3.org/2000/svg"
            width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" placeholder="Search channels..." autocomplete="off"
            class="search-input w-full text-slate-100 py-2.5 pl-10 pr-10 rounded-full text-sm outline-none" />
          <button id="search-clear"
            class="search-clear-btn absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white"
            aria-label="Clear search">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <!-- Categories -->
        <div class="overflow-x-auto -mx-4 sm:-mx-5 px-4 sm:px-5 pb-1 custom-scrollbar">
          <div id="category-bar" class="flex gap-2 w-max pr-4 sm:pr-5">
            <!-- Categories injected via JS -->
          </div>
        </div>
      </div>

      <!-- Channel List -->
      <div class="flex-1 overflow-y-auto p-2.5 sm:p-3 custom-scrollbar relative">
        <div id="channel-list" class="flex flex-col gap-2">
          <!-- Channels injected via JS -->
        </div>

        <div id="no-results" class="hidden flex-col items-center justify-center h-full text-center text-slate-400 p-5">
          <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            class="mb-4 opacity-40">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
            <path d="m15 15-6-6" />
            <path d="m9 15 6-6" />
          </svg>
          <h3 class="text-base text-slate-200 font-semibold mb-1">No channels found</h3>
          <p class="text-sm">Try a different name or category</p>
        </div>
      </div>
    </aside>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script type="module" src="js/app.js?v=3"></script>
</body>

</html>
